name: PR preflight

on:
    pull_request:
    push:
        branches:
            - master
            - main
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: pr-preflight-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    frontend-unit-tests:
        name: Frontend unit tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Vitest
              run: bun run test

    rust-unit-tests:
        name: Rust unit tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Linux dependencies (Tauri / native build)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    build-essential \
                    curl \
                    file \
                    libayatana-appindicator3-dev \
                    libgtk-3-dev \
                    libssl-dev \
                    libwebkit2gtk-4.1-dev \
                    libxdo-dev \
                    librsvg2-dev \
                    patchelf \
                    pkg-config \
                    wget

            - uses: dtolnay/rust-toolchain@stable

            # CI only: ubuntu-latest needs src-tauri/binaries/rg-x86_64-unknown-linux-gnu for
            # bundle.externalBin ("binaries/rg"). macOS devs use scripts/download-rg-sidecar.sh locally.
            - name: Fetch Linux rg sidecar (CI only)
              run: |
                  set -euo pipefail
                  RG_VERSION=14.1.1
                  mkdir -p src-tauri/binaries
                  curl -sSL "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VERSION}/ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C /tmp
                  install -m755 "/tmp/ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl/rg" "src-tauri/binaries/rg-x86_64-unknown-linux-gnu"

            - name: cargo test
              run: cargo test --manifest-path src-tauri/Cargo.toml
